<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akshaya Srinivasan | Data Engineer & Software Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Inter',sans-serif;

background:
radial-gradient(circle at 15% 20%, rgba(0,229,255,0.15), transparent 35%),
radial-gradient(circle at 80% 0%, rgba(168,85,247,0.15), transparent 35%),
radial-gradient(circle at 90% 80%, rgba(255,128,171,0.12), transparent 40%),
#020617;

color:#e5e7eb;
}

.container{
max-width:1200px;
margin:auto;
padding:90px 40px;
}

.hero{
display:grid;
grid-template-columns:1.2fr 1fr;
align-items:center;
gap:80px;
}

.hero h1{
font-size:72px;
line-height:1.05;
margin:0;
font-weight:800;
letter-spacing:-1px;
}

.hero .role{
font-size:56px;
font-weight:800;
margin-top:10px;
background:linear-gradient(90deg,#00E5FF,#B388FF);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
margin-top:22px;
font-size:18px;
line-height:1.7;
color:#94a3b8;
max-width:540px;
}

.buttons{
margin-top:32px;
display:flex;
gap:14px;
}

.btn{
padding:14px 26px;
border-radius:12px;
font-weight:600;
text-decoration:none;
transition:all .25s ease;
}

.btn-primary{
background:#22d3ee;
color:#020617;
}

.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(34,211,238,0.3);
}

.btn-outline{
border:1px solid #334155;
color:#e5e7eb;
}

.btn-outline:hover{
background:#020617;
border-color:#22d3ee;
color:#22d3ee;
}

.avatar-box{
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(145deg,#0f172a,#020617);
padding:40px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.05);
box-shadow:
0 10px 40px rgba(0,0,0,0.6),
0 0 40px rgba(34,211,238,0.08);
}

.avatar-box img{
width:220px;
border-radius:50%;
}

.section{
margin-top:140px;
transition:all .8s ease;
}

.section-title{
font-size:46px;
font-weight:800;
text-align:center;
}

.section-title span{
background:linear-gradient(90deg,#a855f7,#8b5cf6);
-webkit-background-clip:text;
color:transparent;
}

.section-sub{
margin-top:12px;
text-align:center;
color:#94a3b8;
margin-bottom:70px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:30px;
}

.card{
background:#0b1120;
padding:34px;
border-radius:20px;
border:1px solid #1e293b;
transition:all .35s ease;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 20px 60px rgba(0,229,255,0.18);
border-color:#22d3ee;
}

.project{
background:#020617;
padding:36px;
border-radius:18px;
border:1px solid #1e293b;
transition:all .35s ease;
}

.project:hover{
transform:translateY(-8px);
box-shadow:0 20px 60px rgba(168,85,247,0.18);
border-color:#a855f7;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">

<div>

<h1>Hi, I'm Akshaya Srinivasan.</h1>

<div class="role">Data Engineer & Software Developer.</div>

<p>
I design, develop, and maintain production-grade ETL pipelines and cloud-native data integrations using Python, SQL, AWS, and Azure.
</p>

<div class="buttons">

<a class="btn btn-primary" href="resume.pdf" target="_blank">Download Resume</a>

<a class="btn btn-outline" href="https://github.com/AkshayaSrinivasan15" target="_blank">View GitHub</a>

<a class="btn btn-outline" href="https://www.linkedin.com/in/akshayasrini/" target="_blank">LinkedIn</a>

</div>

</div>

<div class="avatar-box">
<img src="profile.jpeg" alt="Akshaya profile photo">
</div>

</div>

</div>

</body>
</html>
